<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barbara Sailer · Versions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b0c;
      --fg: #f5f3ee;
      --muted: #d6d2c4;
      --dim:   #9b978a;
      --line: #32323a;

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: "Inter", -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding: 24px 20px 60px;
    }

    header, footer {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
      max-width: 1400px;
      margin: 0 auto;
    }
    header { margin-bottom: 40px; }
    header .brand { color: var(--fg); display: flex; gap: 14px; align-items: baseline; }
    header .brand span { color: var(--muted); }
    header .deploy { color: var(--muted); }

    .title-row {
      max-width: 1400px;
      margin: 40px auto 60px;
      padding: 0 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 40px;
      flex-wrap: wrap;
    }
    .title-row h1 {
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "SOFT" 50, "opsz" 144;
      font-weight: 600;
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 0.9;
      letter-spacing: -0.04em;
    }
    .title-row h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--v3), var(--v5));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .title-row p {
      color: var(--muted);
      max-width: 44ch;
      font-size: 15px;
      line-height: 1.6;
    }

    .lanes {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .lane {
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 24px;
      padding: 24px 24px 24px 20px;
      border: 1px solid var(--line);
      background: #111113;
      border-radius: 4px;
      align-items: stretch;
      position: relative;
    }
    .lane.featured { padding: 32px 32px 32px 24px; grid-template-columns: 104px minmax(0, 1fr); }
    .lane::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0.8;
    }

    .lane-num {
      font-family: "Fraunces", Georgia, serif;
      font-variation-settings: "SOFT" 50, "opsz" 144;
      font-weight: 800;
      font-size: 3rem;
      line-height: 0.85;
      color: var(--accent);
      letter-spacing: -0.04em;
      align-self: flex-start;
      padding-top: 6px;
    }
    .lane.featured .lane-num { font-size: 4rem; }

    .lane-body {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 32px;
      min-width: 0;
      align-items: start;
    }
    .lane.featured .lane-body { grid-template-columns: minmax(320px, 400px) minmax(0, 1fr); }

    .tree, .sub-tree {
      list-style: none;
      margin: 0;
      padding: 0 0 0 4px;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .tree > li, .sub-tree > li {
      position: relative;
      padding: 6px 0 6px 32px;
      min-width: 0;
    }
    .tree > li:first-child { padding-top: 0; }
    .tree > li:last-child { padding-bottom: 0; }
    .tree > li::before,
    .sub-tree > li::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 0;
      bottom: 0;
      border-left: 1px dashed var(--accent);
      opacity: 0.55;
    }
    .tree > li:first-child::before { top: 0; }
    .tree > li:last-child::before {
      bottom: auto;
      height: 34px;
    }
    .sub-tree > li:last-child::before {
      bottom: auto;
      height: 30px;
    }
    .tree > li::after,
    .sub-tree > li::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 34px;
      width: 20px;
      height: 1px;
      background: var(--accent);
      opacity: 0.55;
    }
    .sub-tree > li::after { top: 30px; }
    .sub-tree {
      margin-top: 10px;
      padding-left: 4px;
    }
    .tree .card, .sub-tree .card {
      min-height: auto;
      padding: 14px 18px;
      gap: 10px;
    }
    .tree .card-title, .sub-tree .card-title { font-size: 1.05rem; }
    .tree .card.variant::after, .sub-tree .card.variant::after { display: none; }

    .card {
      position: relative;
      padding: 20px 22px;
      background: #1c1c21;
      border: 1px solid var(--line);
      border-radius: 3px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
      min-height: 120px;
      min-width: 0;
      transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease, transform 0.25s ease;
    }
    .card.variant {
      background: #16161a;
      border-style: dashed;
      border-color: var(--line);
    }
    .card.variant::after {
      content: "";
      position: absolute;
      top: 50%;
      left: -13px;
      width: 12px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }
    .card:hover {
      background: var(--accent);
      color: #0a0a0a;
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .card:hover .card-meta,
    .card:hover .card-desc { color: #0a0a0a; }
    .card:hover .card-tag { background: #0a0a0a; color: var(--accent); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .card-tag {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent);
      color: #0a0a0a;
      padding: 3px 8px;
      border-radius: 2px;
      font-weight: 600;
      transition: background 0.3s, color 0.3s;
      white-space: nowrap;
    }
    .card.variant .card-tag {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .arrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 14px;
      color: inherit;
      transition: transform 0.3s ease;
    }
    .card:hover .arrow { transform: translateX(5px); }
    .card-title {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 600;
      font-size: 1.2rem;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }
    .lane.featured .card:not(.variant) .card-title {
      font-size: 1.6rem;
    }
    .card-desc {
      color: #e6e2d4;
      font-size: 13.5px;
      line-height: 1.55;
    }
    .card-meta {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .card-by {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      margin-top: 2px;
      font-weight: 500;
    }
    .card-by::before { content: "by "; color: var(--dim); font-weight: 400; }
    .card:hover .card-by { color: #0a0a0a; }
    .card:hover .card-by::before { color: #0a0a0a; opacity: 0.6; }

    .placeholder {
      border: 1px dashed var(--line);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--line);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.5;
      cursor: default;
      min-height: 120px;
    }

    .view-toggle {
      max-width: 1400px;
      margin: 0 auto 24px;
      padding: 0 4px;
      display: flex;
      gap: 4px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .view-toggle button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .view-toggle button:hover { color: var(--fg); border-color: var(--muted); }
    .view-toggle button.active {
      background: var(--fg);
      color: #0a0a0a;
      border-color: var(--fg);
    }

    .flat-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    body.view-flat .lanes { display: none; }
    body.view-flat .flat-grid { display: grid; }
    .flat-card { min-height: 140px; }

    footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--line); }

    @media (max-width: 1000px) {
      .lane { grid-template-columns: 50px 1fr; padding: 18px; }
      .lane.featured { padding: 22px; grid-template-columns: 60px 1fr; }
      .lane-body,
      .lane.featured .lane-body { grid-template-columns: 1fr; gap: 20px; }
      .card.variant::after { display: none; }
      .lane-num { font-size: 2.5rem; }
      .lane.featured .lane-num { font-size: 3rem; }
      .title-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <strong>BARBARA&nbsp;SAILER</strong>
      <span>/ VERSIONS INDEX</span>
    </div>
    <div class="deploy">Letzter Deploy · 22.04.2026 · 08:53</div>
  </header>

  <div class="title-row">
    <h1>Versionen <em>&amp; Branches</em>.</h1>
  </div>

  <div class="view-toggle" role="tablist" aria-label="Ansicht wechseln">
    <button type="button" data-view="lanes" class="active" role="tab" aria-selected="true">Lanes</button>
    <button type="button" data-view="flat" role="tab" aria-selected="false">Flach</button>
  </div>

  <div class="lanes">



  </div>

  <div class="flat-grid">

  </div>

  <footer>
    <span>0 Versionen · 0 Lanes</span>
    <span>Deploy · 22.04.2026 · 08:53</span>
  </footer>

  <script>
    (function() {
      const KEY = 'bs-overview-view';
      const buttons = document.querySelectorAll('.view-toggle button');
      const body = document.body;
      const apply = (v) => {
        body.classList.toggle('view-flat', v === 'flat');
        buttons.forEach((b) => {
          const active = b.dataset.view === v;
          b.classList.toggle('active', active);
          b.setAttribute('aria-selected', active ? 'true' : 'false');
        });
      };
      const saved = localStorage.getItem(KEY);
      if (saved === 'flat' || saved === 'lanes') apply(saved);
      buttons.forEach((b) => b.addEventListener('click', () => {
        const v = b.dataset.view;
        apply(v);
        localStorage.setItem(KEY, v);
      }));
    })();
  </script>
</body>
</html>
